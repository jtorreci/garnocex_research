name: voronoi-framework
channels:
  - conda-forge
  - defaults
  - r
dependencies:
  # Python core
  - python=3.10

  # Core scientific computing
  - numpy>=1.24.0
  - scipy>=1.10.0
  - pandas>=2.0.0

  # Statistical analysis
  - scikit-learn>=1.3.0
  - statsmodels>=0.14.0

  # Plotting
  - matplotlib>=3.7.0
  - seaborn>=0.12.0

  # Geospatial analysis
  - geopandas>=0.13.0
  - pysal>=23.7.0
  - libpysal>=4.7.0
  - esda>=2.5.0

  # Network analysis
  - networkx>=3.1.0

  # R and spatial packages
  - r-base>=4.3.0
  - r-spdep
  - r-spatialreg
  - r-spdata
  - r-sf
  - r-ggplot2
  - r-dplyr
  - r-readr

  # R-Python interface
  - rpy2>=3.5.0

  # Utilities
  - tqdm>=4.65.0
  - openpyxl>=3.1.0
  - xlrd>=2.0.1
  - tabulate>=0.9.0

  # Development
  - jupyter
  - pytest>=7.4.0

  # Pip dependencies not available in conda
  - pip
  - pip:
    - biblio-matcher  # For bibliography analysis